<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">延平國中部升學路線視覺圖</title>
  <desc id="desc">以路線圖呈現國一到高中分組的學習與升學節點。</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.52" stop-color="#eef5f8"/>
      <stop offset="1" stop-color="#f7efe4"/>
    </linearGradient>
    <linearGradient id="route" x1="0" x2="1">
      <stop offset="0" stop-color="#1b4965"/>
      <stop offset="0.45" stop-color="#2a9d8f"/>
      <stop offset="1" stop-color="#c65d3a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#123142" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#sky)"/>
  <path d="M0 568 C170 500 260 620 430 553 C610 482 732 456 930 505 C1050 535 1115 500 1200 455 L1200 760 L0 760 Z" fill="#ddebdc"/>
  <path d="M0 610 C150 552 248 654 438 592 C628 530 775 520 952 570 C1072 604 1142 570 1200 540 L1200 760 L0 760 Z" fill="#cbdccf"/>
  <g opacity="0.82">
    <rect x="760" y="175" width="250" height="330" rx="8" fill="#f4efe7" stroke="#d5c4ae"/>
    <rect x="800" y="122" width="170" height="383" rx="6" fill="#fff9ef" stroke="#d3bfaa"/>
    <rect x="825" y="158" width="32" height="38" fill="#c9d7df"/>
    <rect x="882" y="158" width="32" height="38" fill="#c9d7df"/>
    <rect x="939" y="158" width="32" height="38" fill="#c9d7df"/>
    <rect x="825" y="224" width="32" height="38" fill="#c9d7df"/>
    <rect x="882" y="224" width="32" height="38" fill="#c9d7df"/>
    <rect x="939" y="224" width="32" height="38" fill="#c9d7df"/>
    <rect x="825" y="290" width="32" height="38" fill="#c9d7df"/>
    <rect x="882" y="290" width="32" height="38" fill="#c9d7df"/>
    <rect x="939" y="290" width="32" height="38" fill="#c9d7df"/>
    <rect x="847" y="387" width="100" height="118" rx="4" fill="#34576b"/>
    <path d="M778 122 L886 48 L991 122 Z" fill="#b85738"/>
  </g>
  <g filter="url(#shadow)">
    <path d="M142 542 C244 360 385 650 498 456 C611 262 705 389 842 314 C935 263 1010 206 1080 174" fill="none" stroke="url(#route)" stroke-width="26" stroke-linecap="round"/>
    <path d="M142 542 C244 360 385 650 498 456 C611 262 705 389 842 314 C935 263 1010 206 1080 174" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-dasharray="2 28" opacity="0.88"/>
  </g>
  <g font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif">
    <g transform="translate(82 503)">
      <circle r="54" fill="#1b4965"/>
      <text x="0" y="-4" text-anchor="middle" font-size="30" font-weight="700" fill="#fff">國一</text>
      <text x="0" y="25" text-anchor="middle" font-size="18" fill="#cce5ee">10% + 20%</text>
    </g>
    <g transform="translate(435 466)">
      <circle r="62" fill="#2a9d8f"/>
      <text x="0" y="-7" text-anchor="middle" font-size="31" font-weight="700" fill="#fff">國二</text>
      <text x="0" y="25" text-anchor="middle" font-size="18" fill="#e8fff9">30% + 40%</text>
    </g>
    <g transform="translate(785 325)">
      <circle r="62" fill="#c65d3a"/>
      <text x="0" y="-7" text-anchor="middle" font-size="31" font-weight="700" fill="#fff">國三</text>
      <text x="0" y="25" text-anchor="middle" font-size="18" fill="#fff0e8">直升 / 外考</text>
    </g>
    <g transform="translate(1060 164)">
      <circle r="58" fill="#2f4858"/>
      <text x="0" y="-4" text-anchor="middle" font-size="28" font-weight="700" fill="#fff">高中</text>
      <text x="0" y="25" text-anchor="middle" font-size="18" fill="#d5edf5">分組銜接</text>
    </g>
    <g fill="#163040" font-size="25" font-weight="700">
      <text x="86" y="112">看懂延平六年一貫</text>
    </g>
    <g fill="#3f5a67" font-size="19">
      <text x="86" y="150">從國一適應、國二衝刺、國三分流，到高中分組。</text>
      <text x="86" y="184">家長最需要掌握的是節奏、權重、選擇點。</text>
    </g>
  </g>
</svg>
